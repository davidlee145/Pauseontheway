    "body": "제1조(목적)\n본 약관은 주식회사 메리굿(이하 “회사”)이 제공하는 Pause on the Way 서비스(이하 “서비스”)의 이용과 관련하여 회사와 이용자 간의 권리, 의무 및 책임사항을 정함을 목적으로 합니다.\n\n제2조(정의)\n1. “서비스”란 회사가 서울과 제주에서 제공하는 사람 대화 동행 서비스로서, 50분 웨이메이트 세션에 대한 문의, 예약, 매칭, 안내, 진행 및 결제 관련 절차를 말합니다.\n2. “이용자”란 회사가 제공하는 웹사이트, 문의 폼, 설문 폼, 유선·이메일 등 채널을 통해 서비스를 문의하거나 이용하는 사람을 말합니다.\n3. “웨이메이트”란 이용자와 공개적이고 조용한 공간에서 마주 앉아 50분 동안 대화 동행을 제공하는 사람을 말합니다.\n4. “세션”이란 이용자와 웨이메이트가 사전 예약된 시간과 장소에서 진행하는 50분 대화 동행 시간을 말합니다.\n\n제3조(서비스의 성격)\n1. 서비스는 의료행위, 심리치료, 정신건강 상담, 진단, 처방, 코칭 또는 문제 해결을 제공하는 서비스가 아닙니다.\n2. 웨이메이트는 상담사, 치료사, 의사, 코치 또는 보호자가 아니며, 이용자의 이야기를 판단하거나 진단하지 않습니다.\n3. 이용자에게 자해·타해 위험, 정신건강 위기, 범죄 피해, 긴급 구조가 필요한 상황이 있는 경우에는 112, 119, 의료기관, 전문 상담기관 또는 지역 응급지원기관에 즉시 도움을 요청해야 합니다.\n\n제4조(서비스 이용 및 예약)\n1. 이용자는 회사가 제공하는 채널을 통해 문의, 예약 신청 및 결제를 진행할 수 있습니다.\n2. 회사는 예약 가능 지역, 일정, 장소, 웨이메이트 매칭 가능 여부, 세션 진행 방식 및 변경·취소 기준을 안내합니다.\n3. 세션은 사전 예약제로 운영되며, 예약 확정 후 이용자에게 세션 장소와 준비사항이 안내됩니다.\n4. 서비스 제공 지역은 운영 상황에 따라 변경될 수 있으며, 변경 시 웹사이트 또는 서비스 채널을 통해 안내합니다.\n\n제5조(결제, 변경 및 취소)\n1. 유료 세션의 결제, 변경, 취소 및 환불은 회사가 별도로 게시한 취소·환불정책에 따릅니다.\n2. 문의글 작성, 예약 가능 여부 확인 등 결제 전 단계는 무료로 제공될 수 있습니다.\n3. 예약 확정 후 이용자의 사정으로 일정 변경 또는 취소가 필요한 경우, 이용자는 가능한 한 빠르게 회사에 알려야 합니다.\n\n제6조(이용자 의무 및 금지행위)\n1. 이용자는 문의, 예약, 결제 및 세션 진행 과정에서 정확한 정보를 제공해야 합니다.\n2. 이용자는 세션 장소의 이용 규칙, 회사의 안내사항, 웨이메이트의 안전 관련 안내를 준수해야 합니다.\n3. 이용자는 다음 행위를 해서는 안 됩니다.\n- 욕설, 모욕, 위협, 폭력적 언행 또는 공포감을 유발하는 행위\n- 성적 발언, 성적 제안, 신체 접촉 시도 또는 사적 만남 강요\n- 웨이메이트의 개인 연락처 요구, 사적 관계 형성 강요 또는 서비스 범위를 벗어난 요청\n- 세션의 무단 촬영, 녹음, 녹화, 공개 또는 공유\n- 음주, 약물, 폭력적 행동, 심각한 지각 등으로 정상적인 세션 진행을 방해하는 행위\n- 허위 예약, 타인 명의 이용, 결제 부정 사용 등 부정 이용 행위\n4. 위 금지행위가 발생하는 경우 회사 또는 웨이메이트는 세션을 즉시 중단할 수 있으며, 환불이 제한될 수 있습니다.\n\n제7조(비밀유지 및 안전 예외)\n1. 회사와 웨이메이트는 세션 운영 과정에서 알게 된 이용자의 이야기를 서비스 운영 목적 외에 부당하게 외부에 공유하지 않습니다.\n2. 다만, 자해 또는 타해 위험, 폭력, 범죄, 실종, 응급상황 등 긴급한 안전 문제가 감지되는 경우, 이용자 및 타인의 안전 확보를 위해 필요한 최소한의 정보를 외부 기관 또는 관계자에게 제공하거나 도움을 요청할 수 있습니다.\n\n제8조(개인정보)\n회사는 문의, 예약, 매칭, 세션 안내, 결제, 고객 응대 및 안전한 서비스 운영을 위해 필요한 범위 내에서 개인정보를 처리하며, 구체적인 사항은 개인정보처리방침에 따릅니다.\n\n제9     "body": "第1条（目的）\n本規約は、株式会社メリーグッド（以下「当社」）が提供するPause on the Wayサービス（以下「本サービス」）の利用に関し、当社と利用者との間の権利、義務および責任事項を定めることを目的とします。\n\n第2条（定義）\n1. 「本サービス」とは、当社がソウルおよび済州で提供する対話同行サービスであり、50分間のWaymateセッションに関するお問い合わせ、予約、マッチング、案内、実施および決済に関連する手続をいいます。\n2. 「利用者」とは、当社が提供するウェブサイト、お問い合わせフォーム、アンケートフォーム、電話、メールその他のチャネルを通じて本サービスについて問い合わせ、または利用する者をいいます。\n3. 「Waymate」とは、公開された落ち着いた場所で利用者と向かい合い、50分間の対話同行を提供する者をいいます。\n4. 「セッション」とは、利用者とWaymateが事前に予約された日時および場所で行う50分間の対話同行時間をいいます。\n\n第3条（本サービスの性質）\n1. 本サービスは、医療行為、心理療法、精神保健相談、診断、処方、コーチングまたは問題解決を提供するものではありません。\n2. Waymateは、カウンセラー、セラピスト、医師、コーチまたは保護者ではなく、利用者の話を評価または診断しません。\n3. 利用者に自傷・他害のおそれ、精神的危機、犯罪被害または緊急救助を必要とする状況がある場合、112、119、医療機関、専門相談機関または地域の緊急支援機関に直ちに助けを求める必要があります。\n\n第4条（本サービスの利用および予約）\n1. 利用者は、当社が提供するチャネルを通じて、お問い合わせ、予約申込みおよび決済を行うことができます。\n2. 当社は、予約可能地域、日程、会場、Waymateのマッチング可否、セッションの進行方法ならびに変更・キャンセル基準をご案内します。\n3. セッションは事前予約制で運営され、予約確定後、利用者にセッション会場および準備事項をご案内します。\n4. サービス提供地域は運営状況により変更されることがあり、変更時にはウェブサイトまたはサービスチャネルを通じてお知らせします。\n\n第5条（決済、変更およびキャンセル）\n1. 有料セッションの決済、変更、キャンセルおよび返金については、当社が別途掲示するキャンセル・返金ポリシーに従います。\n2. お問い合わせの送信や予約可否の確認など、決済前の段階は無料で提供される場合があります。\n3. 予約確定後、利用者の事情により日程変更またはキャンセルが必要となった場合、利用者はできるだけ早く当社へ連絡しなければなりません。\n\n第6条（利用者の義務および禁止行為）\n1. 利用者は、お問い合わせ、予約、決済およびセッションの過程で正確な情報を提供しなければなりません。\n2. 利用者は、セッション会場の利用規則、当社の案内事項およびWaymateの安全に関する案内を遵守しなければなりません。\n3. 利用者は、以下の行為を行ってはなりません。\n- 暴言、侮辱、脅迫、暴力的な言動または恐怖を与える行為\n- 性的な発言、性的な提案、身体接触の試みまたは私的な面会の強要\n- Waymateの個人連絡先の要求、私的関係の形成の強要または本サービスの範囲を超える要求\n- セッションの無断撮影、録音、録画、公開または共有\n- 飲酒、薬物、暴力的行為または著しい遅刻等により正常なセッションの進行を妨げる行為\n- 虚偽の予約、他人名義での利用、決済の不正使用その他の不正利用\n4. 禁止行為があった場合、当社またはWaymateはセッションを直ちに中止することができ、返金が制限される場合があります。\n\n第7条（秘密保持および安全上の例外）\n1. 当社およびWaymateは、セッションの運営過程で知り得た利用者の話を、本サービスの運営目的以外に不当に外部へ共有しません。\n2. ただし、自傷・他害のおそれ、暴力、犯罪、行方不明、緊急事態その他の重大な安全上の問題が認められる場合、利用者および第三者の安全確保のため、必要最小限の情報を外部機関または関係者へ提供し、または支援を要請することがあります。\n\n第8条（個人情報）\n当社は、お問い合わせ、予約、マッチング、セッション案内、決済、カスタマーサポートおよび安全なサービス運営に必要な範囲内で個人情報を取り扱います。詳細はプライバシーポリシーに従います。\n\n第9条（本サービスの中断および利用制限）\n1. 当社は、運営上の必要、提携会場またはWaymateの事情、天災、感染症、交通・通信障害その他の理由によ       const SUPPORTED_LANGUAGES = ["ko", "en", "ja", "zh"];

      const DOCUMENT_LANGUAGES = {
        ko: "ko",
        en: "en",
        ja: "ja",
        zh: "zh-CN",
      };

      const TITLES = {
        "ko": "이용약관 | Pause on the Way",
        "en": "Terms of Service | Pause on the Way",
        "ja": "利用規約 | Pause on the Way",
        "zh": "服务条款 | Pause on the Way"
};

      const DESCRIPTIONS = {
        "ko": "Pause on the Way 이용약관",
        "en": "Pause on the Way Terms of Service",
        "ja": "Pause on the Way 利用規約",
        "zh": "Pause on the Way 服务条款"
};

      const RIGHTS = {
        "ko": "모든 권리 보유.",
        "en": "All rights reserved.",
        "ja": "無断転載を禁じます。",
        "zh": "保留所有权利。"
};

      function normalizeLanguage(value) {
        const language = String(value || "").toLowerCase();

        if (language === "ko" || language.startsWith("ko-")) return "ko";
        if (language === "en" || language.startsWith("en-")) return "en";
        if (
          language === "ja" ||
          language === "jp" ||
          language.startsWith("ja-")
        ) {
          return "ja";
        }
        if (
          language === "zh" ||
          language === "cn" ||
          language.startsWith("zh-")
        ) {
          return "zh";
        }

        return null;
      }

      function getInitialLang() {
        const url = new URL(location.href);
        const urlLang = normalizeLanguage(url.searchParams.get("lang"));

        // 기존 ?lang= 링크는 한 번 인식한 뒤 주소창에서 제거합니다.
        if (url.searchParams.has("lang")) {
          url.searchParams.delete("lang");
          history.replaceState(null, "", url.pathname + url.search + url.hash);
        }

        if (urlLang) return urlLang;

        const savedLang = normalizeLanguage(localStorage.getItem("ptw-lang"));
        if (savedLang) return savedLang;

        const browserLanguages =
          navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || "ko"];

        for (const browserLanguage of browserLanguages) {
          const normalized = normalizeLanguage(browserLanguage);
          if (normalized) return normalized;
        }

        return "ko";
      }

      function paintButtons(lang) {
        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.lang === lang),
          );
        });
      }

      function setLang(lang) {
        const L = SUPPORTED_LANGUAGES.includes(lang) ? lang : "ko";
        localStorage.setItem("ptw-lang", L);
        document.documentElement.lang = DOCUMENT_LANGUAGES[L];
        document.title = TITLES[L];

        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) {
          metaDesc.setAttribute("content", DESCRIPTIONS[L]);
        }

        document.getElementById("title").textContent = TERMS[L].title;
        document.getElementById("effective").textContent =
          TERMS[L].effective;
        document.getElementById("body").textContent = TERMS[L].body;
        document.getElementById("rights").textContent = RIGHTS[L];

        paintButtons(L);

      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => {
          setLang(button.dataset.lang);
        });
      });

      setLang(getInitialLang());
    </script>
