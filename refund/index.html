  "ko": {
    "title": "취소·환불정책",
    "effective": "게시일: 2026년 6월 25일 · 시행일: 2026년 6월 25일",
    "body": "[공통 안내]\n- 본 취소·환불정책은 Pause on the Way의 유료 50분 웨이메이트 세션에 적용됩니다.\n- 문의글 작성, 예약 가능 여부 확인 등 결제 전 단계에는 별도의 이용료가 부과되지 않습니다.\n- 모든 세션은 사전 예약제로 운영되며, 예약 확정 시 웨이메이트와 장소가 함께 배정됩니다.\n- 변경 또는 취소가 필요한 경우 가능한 한 빠르게 회사에 요청해 주세요.\n\n[취소 및 환불 기준]\n- 세션 시작 24시간 전까지 취소: 결제금액 100% 환불\n- 세션 시작 24시간 이내 취소: 환불 불가\n- 예약 시간 이후 취소 또는 노쇼: 환불 불가\n\n[일정 변경]\n- 세션 시작 24시간 전까지: 가능한 일정이 있는 경우 1회에 한하여 일정 변경 가능\n- 세션 시작 24시간 이내: 원칙적으로 일정 변경 불가\n- 회사, 웨이메이트 또는 제휴 공간 사정으로 기존 일정 진행이 어려운 경우: 고객 동의 하에 일정 변경 또는 100% 환불\n\n[지각 및 현장 진행]\n- 이용자가 늦게 도착한 경우 세션은 원래 예약된 종료 시간에 종료됩니다.\n- 지각으로 인해 이용 시간이 줄어든 경우 부분 환불은 제공되지 않습니다.\n- 예약 시작 후 15분 이상 연락 없이 나타나지 않는 경우 노쇼로 처리될 수 있습니다.\n- 현장 상황에 따라 남은 시간 내에서 세션이 진행될 수 있습니다.\n\n[중도 종료 및 환불 제한]\n아래 행위가 발생하는 경우 회사 또는 웨이메이트는 세션을 즉시 중단할 수 있으며, 이 경우 환불은 제공되지 않을 수 있습니다.\n- 욕설, 모욕, 위협, 폭력적 언행\n- 성적 발언, 성적 제안, 신체 접촉 시도\n- 웨이메이트의 개인 연락처 요구 또는 사적 만남 강요\n- 무단 촬영, 녹음, 녹화 또는 이를 강요하는 행위\n- 음주, 약물, 폭력적 행동 등으로 정상적인 세션 진행이 어려운 경우\n\n[운영 사유로 진행이 불가한 경우]\n- 회사, 웨이메이트 또는 제휴 공간의 사정으로 세션 진행이 불가능한 경우 고객에게 100% 환불 또는 일정 변경 중 선택할 수 있도록 안내합니다.\n- 천재지변, 감염병, 심각한 교통 장애, 공간 운영 중단 등 불가피한 사정이 발생한 경우 회사는 가능한 대체 일정 또는 환불 방법을 안내합니다.\n\n[환불 처리 방식]\n- 카드 결제: 결제대행사(PG) 및 카드사 처리 일정에 따라 승인 취소 또는 부분 취소로 처리됩니다.\n- 계좌이체 또는 기타 결제수단: 회사 확인 후 영업일 기준 순차 처리됩니다.\n- 결제수단, 카드사, 은행, PG사의 사정에 따라 실제 환불 완료까지 시간이 소요될 수 있습니다.\n\n[정책 변경]\n회사는 운영상 필요 또는 관계 법령 변경에 따라 본 정책을 변경할 수 있으며, 중요한 변경은 웹사이트 또는 서비스 채널을 통해 안내합니다.\n"
  },

    "effective": "Posted: June 25, 2026 · Effective: June 25, 2026",
    "body": "[General]\n- This Cancellation & Refund Policy applies to paid 50-minute Pause on the Way Waymate sessions.\n- Inquiry submission and availability checks before payment are not subject to separate fees.\n- All sessions are reservation-based. Once confirmed, a Waymate and venue are assigned in advance.\n- Please request any changes or cancellations as early as possible.\n\n[Cancellation and Refund]\n- Cancellation up to 24 hours before the session start time: 100% refund\n- Cancellation within 24 hours of the session start time: non-refundable\n- Cancellation after the scheduled start time or no-show: non-refundable\n\n[Rescheduling]\n- Up to 24 hours before the session start time: one reschedule may be allowed, subject to availability\n- Within 24 hours of the session start time: rescheduling is generally not available\n- If the original schedule cannot proceed due to reasons attributable to the Company, the Waymate, or the partner venue: the User may choose either a reschedule or a 100% refund\n\n[Lateness and On-site Operation]\n- If a User arrives late, the session will still end at the originally scheduled end time.\n- No partial refund is provided for reduced session time due to lateness.\n- If a User does not appear or contact the Company for more than 15 minutes after the scheduled start time, the booking may be treated as a no-show.\n- Depending on on-site circumstances, the session may still proceed within the remaining time.\n\n[Early Termination and Refund Restrictions]\nIf any of the following conduct occurs, the Company or the Waymate may immediately terminate the session, and no refund may be issued:\n- Verbal abuse, insults, threats, or violent language\n- Sexual remarks, sexual propositions, or attempts at physical contact\n- Requests for a Waymate’s private contact details or coercion for private meetings\n- Unauthorized filming, recording, or coercion to do so\n- Inability to proceed normally due to intoxication, drugs, violence, or disruptive behavior\n\n[Operational Cancellations]\n- If a session cannot proceed due to reasons attributable to the Company, the Waymate, or the partner venue, the User will be offered either a 100% refund or a reschedule.\n- If unavoidable circumstances occur, including natural disasters, infectious disease situations, severe transportation disruption, or venue suspension, the Company will provide guidance on available alternatives or refund methods.\n\n[Refund Processing]\n- Card payments are processed as full or partial cancellations according to the timelines of the payment processor and card issuer.\n- Bank transfers or other payment methods are processed sequentially after Company confirmation, on business days.\n- Actual refund completion may take time depending on the payment method, card issuer, bank, or payment processor.\n\n[Policy Changes]\nThe Company may amend this Policy due to operational needs or changes in applicable laws. Material changes will be announced through the website or service channels.\n"
  },

      const SUPPORTED_LANGUAGES = ["ko", "en", "ja", "zh"];

      const DOCUMENT_LANGUAGES = {
        ko: "ko",
        en: "en",
        ja: "ja",
        zh: "zh-CN",
      };

      const TITLES = {
        "ko": "취소·환불정책 | Pause on the Way",
        "en": "Cancellation & Refund Policy | Pause on the Way",
        "ja": "キャンセル・返金ポリシー | Pause on the Way",
        "zh": "取消与退款政策 | Pause on the Way"
};

      const DESCRIPTIONS = {
        "ko": "Pause on the Way 취소·환불정책",
        "en": "Pause on the Way Cancellation & Refund Policy",
        "ja": "Pause on the Way キャンセル・返金ポリシー",
        "zh": "Pause on the Way 取消与退款政策"
};

      const RIGHTS = {
        "ko": "모든 권리 보유.",
        "en": "All rights reserved.",
        "ja": "無断転載を禁じます。",
        "zh": "保留所有权利。"
};

      function normalizeLanguage(value) {
        const language = String(value || "").toLowerCase();

        if (language === "ko" || language.startsWith("ko-")) return "ko";
        if (language === "en" || language.startsWith("en-")) return "en";
        if (
          language === "ja" ||
          language === "jp" ||
          language.startsWith("ja-")
        ) {
          return "ja";
        }
        if (
          language === "zh" ||
          language === "cn" ||
          language.startsWith("zh-")
        ) {
          return "zh";
        }

        return null;
      }

      function getInitialLang() {
        const url = new URL(location.href);
        const urlLang = normalizeLanguage(url.searchParams.get("lang"));

        // 기존 ?lang= 링크는 한 번 인식한 뒤 주소창에서 제거합니다.
        if (url.searchParams.has("lang")) {
          url.searchParams.delete("lang");
          history.replaceState(null, "", url.pathname + url.search + url.hash);
        }

        if (urlLang) return urlLang;

        const savedLang = normalizeLanguage(localStorage.getItem("ptw-lang"));
        if (savedLang) return savedLang;

        const browserLanguages =
          navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || "ko"];

        for (const browserLanguage of browserLanguages) {
          const normalized = normalizeLanguage(browserLanguage);
          if (normalized) return normalized;
        }

        return "ko";
      }

      function paintButtons(lang) {
        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.lang === lang),
          );
        });
      }

      function setLang(lang) {
        const L = SUPPORTED_LANGUAGES.includes(lang) ? lang : "ko";
        localStorage.setItem("ptw-lang", L);
        document.documentElement.lang = DOCUMENT_LANGUAGES[L];
        document.title = TITLES[L];

        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) {
          metaDesc.setAttribute("content", DESCRIPTIONS[L]);
        }

        document.getElementById("title").textContent = POLICY[L].title;
        document.getElementById("effective").textContent =
          POLICY[L].effective;
        document.getElementById("body").textContent = POLICY[L].body;
        document.getElementById("rights").textContent = RIGHTS[L];

        paintButtons(L);

      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => {
          setLang(button.dataset.lang);
        });
      });

      setLang(getInitialLang());
    </script>
  </body>
</html>
