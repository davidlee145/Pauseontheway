<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>웨이메이트 지원 문의 | Pause on the Way</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        font-family: Inter, sans-serif;
        background: #faf8f5;
        color: #1f2937;
        margin: 0;
      }
      main {
        padding: 120px 16px;
        max-width: 720px;
        margin: 0 auto;
      }
      h1 {
        font-size: 42px;
        margin-bottom: 12px;
        color: #073b3a;
      }
      p {
        color: #6b7280;
        margin-bottom: 40px;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
        background: #fff;
        color: #1f2937;
      }
      textarea {
        height: 220px;
        resize: vertical;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #073b3a;
        box-shadow: 0 0 0 3px rgba(7, 59, 58, 0.12);
      }
      button {
        padding: 16px 24px;
        border-radius: 999px;
        border: 0;
        background: #073b3a;
        color: #fff;
        cursor: pointer;
        font-size: 16px;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .helper {
        margin-top: 32px;
        color: #6b7280;
      }
      .helper a {
        color: #073b3a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-ko="웨이메이트 지원 문의" data-en="Waymate application inquiry">
        웨이메이트 지원 문의
      </h1>

      <p
        data-ko="웨이메이트 활동에 관심이 있거나 지원 절차가 궁금하다면 편하게 문의를 남겨주세요. 활동 방식, 온보딩, 지역과 일정에 대해 안내해드립니다."
        data-en="If you’re interested in becoming a Waymate or have questions about the application process, please leave us a message. We’ll guide you through how it works, onboarding, locations, and scheduling."
      >
        웨이메이트 활동에 관심이 있거나 지원 절차가 궁금하다면 편하게 문의를
        남겨주세요. 활동 방식, 온보딩, 지역과 일정에 대해 안내해드립니다.
      </p>

      <form
        action="https://formsubmit.co/da6a8d5556503e8b9aa8c4af68017380"
        method="POST"
      >
        <input
          name="name"
          placeholder="이름"
          data-placeholder-ko="이름"
          data-placeholder-en="Name"
          required
        />

        <input
          name="email"
          type="email"
          placeholder="이메일"
          data-placeholder-ko="이메일"
          data-placeholder-en="Email"
          required
        />

        <input
          name="phone"
          type="tel"
          inputmode="tel"
          placeholder="휴대전화 (선택)"
          data-placeholder-ko="휴대전화 (선택)"
          data-placeholder-en="Mobile (optional)"
          autocomplete="tel"
        />

        <textarea
          name="message"
          placeholder="웨이메이트 지원과 관련해 궁금한 점을 편하게 남겨주세요"
          data-placeholder-ko="웨이메이트 지원과 관련해 궁금한 점을 편하게 남겨주세요"
          data-placeholder-en="Tell us what you’d like to know about becoming a Waymate"
          required
        ></textarea>

        <input
          type="hidden"
          name="_subject"
          id="form-subject"
          value="웨이메이트 지원 문의 — Pause on the Way"
        />

        <input
          type="hidden"
          name="inquiry_type"
          value="waymate_application_inquiry"
        />
        <input type="text" name="_gotcha" style="display: none" />

        <button
          type="submit"
          data-ko="지원 문의 남기기 →"
          data-en="Send inquiry →"
        >
          지원 문의 남기기 →
        </button>
      </form>

      <p class="helper">
        <span
          data-ko="또는 이메일로 직접 문의해 주세요:"
          data-en="Or email us directly at:"
        >
          또는 이메일로 직접 문의해 주세요:
        </span>
        <strong
          ><a href="mailto:pauseontheway@gmail.com"
            >pauseontheway@gmail.com</a
          ></strong
        >
      </p>
    </main>

    <script>
      function getInitialLang() {
        const urlLang = new URLSearchParams(location.search).get("lang");
        if (urlLang === "en" || urlLang === "ko") return urlLang;

        const saved = localStorage.getItem("ptw-lang");
        if (saved === "en" || saved === "ko") return saved;

        return (navigator.language || "ko").startsWith("en") ? "en" : "ko";
      }

      const lang = getInitialLang();
      localStorage.setItem("ptw-lang", lang);
      document.documentElement.lang = lang;

      const titles = {
        ko: "웨이메이트 지원 문의 | Pause on the Way",
        en: "Waymate application inquiry | Pause on the Way",
      };
      document.title = titles[lang];

      const subjects = {
        ko: "웨이메이트 지원 문의 | Pause on the Way",
        en: "Waymate application inquiry | Pause on the Way",
      };
      document.getElementById("form-subject").value = subjects[lang];

      document.querySelectorAll("[data-ko]").forEach((el) => {
        if (lang === "en" && el.dataset.en) {
          el.textContent = el.dataset.en;
        } else if (lang === "ko") {
          el.textContent = el.dataset.ko;
        }
      });

      document.querySelectorAll("[data-placeholder-ko]").forEach((el) => {
        el.placeholder =
          lang === "en" ? el.dataset.placeholderEn : el.dataset.placeholderKo;
      });

      const btn = document.querySelector("button[type=submit]");
      btn.textContent = lang === "en" ? btn.dataset.en : btn.dataset.ko;
    </script>
  </body>
</html>
