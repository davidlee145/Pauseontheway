<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문의하기 | Pause on the Way</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #faf8f5;
        --text: #1f2937;
        --muted: #6b7280;
        --brand: #073b3a;
        --border: #d1d5db;
        --white: #fff;
        --focus: rgba(7, 59, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Noto Sans KR",
          "Noto Sans JP",
          "Noto Sans SC",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
      }

      main {
        padding: 56px 16px 120px;
        max-width: 720px;
        margin: 0 auto;
      }

      .language-switcher {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 52px;
      }

      .language-button {
        min-width: 48px;
        padding: 9px 13px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--white);
        color: var(--text);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.2s ease;
      }

      .language-button:hover {
        transform: translateY(-1px);
        border-color: var(--brand);
      }

      .language-button[aria-pressed="true"] {
        border-color: var(--brand);
        background: var(--brand);
        color: var(--white);
      }

      .language-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--focus);
      }

      h1 {
        font-size: clamp(36px, 7vw, 42px);
        margin: 0 0 12px;
        color: var(--brand);
        line-height: 1.2;
      }

      p {
        color: var(--muted);
        margin: 0 0 40px;
        line-height: 1.75;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 16px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        font-size: 16px;
        background: var(--white);
        color: var(--text);
      }

      textarea {
        min-height: 220px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 3px var(--focus);
      }

      .submit-button {
        padding: 16px 24px;
        border-radius: 999px;
        border: 0;
        background: var(--brand);
        color: var(--white);
        cursor: pointer;
        font: inherit;
        font-size: 16px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .submit-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(7, 59, 58, 0.14);
      }

      .submit-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--focus);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .helper {
        margin-top: 32px;
        margin-bottom: 0;
        color: var(--muted);
      }

      .helper a {
        color: var(--brand);
        overflow-wrap: anywhere;
      }

      @media (max-width: 520px) {
        main {
          padding-top: 28px;
        }

        .language-switcher {
          justify-content: flex-start;
          margin-bottom: 40px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div
        class="language-switcher"
        role="group"
        aria-label="Language"
      >
        <button
          class="language-button"
          type="button"
          data-lang="ko"
          aria-pressed="true"
        >
          KO
        </button>
        <button
          class="language-button"
          type="button"
          data-lang="en"
          aria-pressed="false"
        >
          EN
        </button>
        <button
          class="language-button"
          type="button"
          data-lang="ja"
          aria-pressed="false"
        >
          JA
        </button>
        <button
          class="language-button"
          type="button"
          data-lang="zh"
          aria-pressed="false"
        >
          中文
        </button>
      </div>

      <h1
        data-ko="문의하기"
        data-en="Contact us"
        data-ja="お問い合わせ"
        data-zh="联系我们"
      >
        문의하기
      </h1>

      <p
        data-ko="서울·제주 50분 웨이메이트 세션이 궁금하다면 편하게 문의를 남겨주세요. 가능한 지역과 일정, 진행 방식을 안내해드립니다."
        data-en="If you have questions about our 50-minute Waymate sessions in Seoul or Jeju, please leave us a message. We’ll guide you through available areas, scheduling, and how the session works."
        data-ja="ソウル・済州での50分間のWaymateセッションについてご質問がありましたら、お気軽にお問い合わせください。利用可能な地域、日程、セッションの流れをご案内します。"
        data-zh="如果您对首尔或济州的50分钟Waymate陪伴交流服务有任何疑问，欢迎给我们留言。我们会为您介绍可预约地区、时间安排及服务流程。"
      >
        서울·제주 50분 웨이메이트 세션이 궁금하다면 편하게 문의를 남겨주세요.
        가능한 지역과 일정, 진행 방식을 안내해드립니다.
      </p>

      <form
        action="https://formsubmit.co/da6a8d5556503e8b9aa8c4af68017380"
        method="POST"
      >
        <input
          name="name"
          placeholder="이름"
          data-placeholder-ko="이름"
          data-placeholder-en="Name"
          data-placeholder-ja="お名前"
          data-placeholder-zh="姓名"
          autocomplete="name"
          aria-label="이름"
          data-aria-ko="이름"
          data-aria-en="Name"
          data-aria-ja="お名前"
          data-aria-zh="姓名"
          required
        />

        <input
          name="email"
          type="email"
          placeholder="이메일"
          data-placeholder-ko="이메일"
          data-placeholder-en="Email"
          data-placeholder-ja="メールアドレス"
          data-placeholder-zh="电子邮箱"
          autocomplete="email"
          aria-label="이메일"
          data-aria-ko="이메일"
          data-aria-en="Email"
          data-aria-ja="メールアドレス"
          data-aria-zh="电子邮箱"
          required
        />

        <input
          name="phone"
          type="tel"
          inputmode="tel"
          placeholder="휴대전화 (선택)"
          data-placeholder-ko="휴대전화 (선택)"
          data-placeholder-en="Mobile (optional)"
          data-placeholder-ja="携帯電話（任意）"
          data-placeholder-zh="手机号码（选填）"
          autocomplete="tel"
          aria-label="휴대전화 (선택)"
          data-aria-ko="휴대전화 (선택)"
          data-aria-en="Mobile (optional)"
          data-aria-ja="携帯電話（任意）"
          data-aria-zh="手机号码（选填）"
        />

        <textarea
          name="message"
          placeholder="궁금한 내용을 편하게 남겨주세요"
          data-placeholder-ko="궁금한 내용을 편하게 남겨주세요"
          data-placeholder-en="Tell us what you’d like to know"
          data-placeholder-ja="ご質問やご相談内容をご自由にご記入ください"
          data-placeholder-zh="请填写您想咨询的内容"
          aria-label="궁금한 내용을 편하게 남겨주세요"
          data-aria-ko="궁금한 내용을 편하게 남겨주세요"
          data-aria-en="Tell us what you’d like to know"
          data-aria-ja="ご質問やご相談内容をご自由にご記入ください"
          data-aria-zh="请填写您想咨询的内容"
          required
        ></textarea>

        <input
          type="hidden"
          name="_subject"
          id="form-subject"
          value="문의하기 | Pause on the Way"
        />

        <input type="hidden" name="inquiry_type" value="customer_inquiry" />
        <input type="text" name="_gotcha" style="display: none" />

        <button
          class="submit-button"
          type="submit"
          data-ko="문의글 남기기 →"
          data-en="Send message →"
          data-ja="お問い合わせを送信 →"
          data-zh="提交咨询 →"
        >
          문의글 남기기 →
        </button>
      </form>

      <p class="helper">
        <span
          data-ko="또는 이메일로 직접 문의해 주세요:"
          data-en="Or email us directly at:"
          data-ja="またはメールで直接お問い合わせください："
          data-zh="或直接发送邮件至："
        >
          또는 이메일로 직접 문의해 주세요:
        </span>
        <strong>
          <a href="mailto:pauseontheway@gmail.com">
            pauseontheway@gmail.com
          </a>
        </strong>
      </p>
    </main>

    <script>
      const supportedLanguages = ["ko", "en", "ja", "zh"];

      const documentLanguages = {
        ko: "ko",
        en: "en",
        ja: "ja",
        zh: "zh-CN",
      };

      const titles = {
        ko: "문의하기 | Pause on the Way",
        en: "Contact us | Pause on the Way",
        ja: "お問い合わせ | Pause on the Way",
        zh: "联系我们 | Pause on the Way",
      };

      const subjects = {
        ko: "문의하기 | Pause on the Way",
        en: "Contact us | Pause on the Way",
        ja: "お問い合わせ | Pause on the Way",
        zh: "联系我们 | Pause on the Way",
      };

      function normalizeLanguage(value) {
        const language = String(value || "").toLowerCase();

        if (language === "ko" || language.startsWith("ko-")) return "ko";
        if (language === "en" || language.startsWith("en-")) return "en";
        if (
          language === "ja" ||
          language === "jp" ||
          language.startsWith("ja-")
        ) {
          return "ja";
        }
        if (
          language === "zh" ||
          language === "cn" ||
          language.startsWith("zh-")
        ) {
          return "zh";
        }

        return null;
      }

      function getInitialLang() {
        const url = new URL(location.href);
        const urlLang = normalizeLanguage(url.searchParams.get("lang"));

        // 기존 ?lang= 링크는 한 번 인식한 뒤 주소창에서 제거합니다.
        if (url.searchParams.has("lang")) {
          url.searchParams.delete("lang");
          history.replaceState(null, "", url.pathname + url.search + url.hash);
        }

        if (urlLang) return urlLang;

        const savedLang = normalizeLanguage(localStorage.getItem("ptw-lang"));
        if (savedLang) return savedLang;

        const browserLanguages =
          navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || "ko"];

        for (const browserLanguage of browserLanguages) {
          const normalized = normalizeLanguage(browserLanguage);
          if (normalized) return normalized;
        }

        return "ko";
      }

      function getTranslation(element, lang, prefix = "") {
        const key =
          prefix +
          lang.charAt(0).toUpperCase() +
          lang.slice(1);

        return element.dataset[key] || null;
      }

      function applyLanguage(lang) {
        const nextLang = supportedLanguages.includes(lang) ? lang : "ko";

        localStorage.setItem("ptw-lang", nextLang);
        document.documentElement.lang = documentLanguages[nextLang];
        document.title = titles[nextLang];
        document.getElementById("form-subject").value = subjects[nextLang];

        document.querySelectorAll("[data-ko]").forEach((element) => {
          const translatedText = element.dataset[nextLang];
          if (translatedText) element.textContent = translatedText;
        });

        document
          .querySelectorAll("[data-placeholder-ko]")
          .forEach((element) => {
            const translatedPlaceholder = getTranslation(
              element,
              nextLang,
              "placeholder",
            );
            if (translatedPlaceholder) {
              element.placeholder = translatedPlaceholder;
            }
          });

        document.querySelectorAll("[data-aria-ko]").forEach((element) => {
          const translatedAriaLabel = getTranslation(
            element,
            nextLang,
            "aria",
          );
          if (translatedAriaLabel) {
            element.setAttribute("aria-label", translatedAriaLabel);
          }
        });

        document.querySelectorAll("[data-lang]").forEach((button) => {
          button.setAttribute(
            "aria-pressed",
            String(button.dataset.lang === nextLang),
          );
        });

      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => {
          applyLanguage(button.dataset.lang);
        });
      });

      applyLanguage(getInitialLang());
    </script>
  </body>
</html>
